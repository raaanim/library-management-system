{% extends "base.html" %}
{% block title %}Accedi - LibraryApp{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8 mt-12 border border-gray-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-indigo-900">Bentornato</h1>
        <p class="text-gray-500 mt-2">Accedi al tuo account per gestire i prestiti</p>
    </div>
    
    <form method="POST" action="{{ url_for('member.login') }}" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Indirizzo Email</label>
            <div class="relative">
                <input type="email" name="email" required placeholder="tuo@email.com"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <input type="password" name="password" required placeholder="••••••••"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        
        <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition transform active:scale-95">
            Accedi
        </button>
    </form>
    
    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-600">
            Non hai ancora un account? 
            <a href="{{ url_for('member.register') }}" class="text-indigo-600 font-bold hover:underline">Registrati ora</a>
        </p>
    </div>
</div>
{% endblock %}
