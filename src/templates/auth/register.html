{% extends "base.html" %}
{% block title %}Registrazione{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-8">
    <h1 class="text-2xl font-bold text-indigo-700 mb-6">Crea account</h1>
    <form method="POST" action="{{ url_for('member.register') }}" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
            Registrati
        </button>
    </form>
    <p class="mt-4 text-sm text-gray-600 text-center">
        Hai già un account? <a href="{{ url_for('member.login') }}" class="text-indigo-600 hover:underline">Accedi</a>
    </p>
</div>
{% endblock %}
